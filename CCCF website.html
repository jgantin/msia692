<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>CCCFC — Communauté Catholique Charismatique Francophone du Colorado</title>
  <meta name="description" content="Communauté Catholique Charismatique Francophone du Colorado — messes en français, activités, soutien spirituel et vie communautaire à Denver et Lakewood." />
  <meta name="keywords" content="catholique, francophone, Colorado, Denver, messe en français, communauté, CCCFC" />

  <!-- Social Sharing -->
  <meta property="og:title" content="CCCFC — Communauté Catholique Francophone du Colorado" />
  <meta property="og:description" content="Messes en français, activités communautaires et vie de foi pour les francophones du Colorado." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ochoumared.github.io/CCCFC/" />
  <meta property="og:image" content="assets/images/cover.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B3E;
      --navy-mid: #1A2D5A;
      --gold: #C9A84C;
      --gold-light: #E2C47A;
      --cream: #F7F4EF;
      --warm-white: #FDFCF9;
      --text: #1C1C1C;
      --text-muted: #5A5A5A;
      --border: #DDD8CF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--warm-white);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      border-bottom: 2px solid var(--gold);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .nav-cross { font-size: 1.4rem; color: var(--gold); }

    .nav-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
      letter-spacing: 0.02em;
    }

    .nav-title span { color: var(--gold); }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 1.75rem;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-cta {
      background: var(--gold);
      color: var(--navy) !important;
      padding: 0.4rem 1.1rem;
      border-radius: 2px;
      font-weight: 600 !important;
    }

    .nav-cta:hover { background: var(--gold-light); }

    /* HERO */
    .hero {
      background: var(--navy);
      min-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 300;
      color: white;
      line-height: 1.15;
      max-width: 780px;
      margin-bottom: 0.5rem;
    }

    .hero h1 em { color: var(--gold-light); }

    .hero-tagline-wrap {
      margin: 1.75rem 0 2.5rem;
      perspective: 600px;
    }

    .hero-tagline {
      display: inline-block;
      position: relative;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      height: 2em;
      line-height: 2em;
    }

    .hero-tagline-wrap:hover .hero-tagline { transform: rotateX(180deg); }

    .hero-tagline .front,
    .hero-tagline .back {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      white-space: nowrap;
    }

    .hero-tagline .back { transform: rotateX(180deg); color: var(--gold); }

    .hero-desc {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
      padding: 0.75rem 1.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--gold-light); }

    .btn-outline {
      background: transparent;
      color: white;
      padding: 0.75rem 1.75rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      text-decoration: none;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .hero-scroll {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* STATS BAR */
    .stats-bar {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .stat {
      text-align: center;
      padding: 1.75rem 1rem;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--navy);
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    /* SECTIONS */
    section { padding: 5rem 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    .section-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .section-sub {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 1.5rem 0;
    }

    /* ABOUT */
    #about { background: var(--warm-white); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      margin-top: 3rem;
    }

    .about-image-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      gap: 0.5rem;
    }

    .about-image-placeholder .cross-big {
      font-size: 3rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .about-pull {
      position: absolute;
      bottom: -1.5rem;
      right: -1.5rem;
      background: var(--gold);
      color: var(--navy);
      padding: 1.25rem 1.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      max-width: 200px;
      line-height: 1.4;
      border-radius: 2px;
    }

    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 2rem;
    }

    .pillar {
      padding: 1.25rem;
      background: var(--cream);
      border-left: 3px solid var(--gold);
    }

    .pillar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.4rem;
    }

    .pillar p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* MASS */
    #mass { background: var(--navy); }

    #mass .section-title { color: white; }
    #mass .section-sub { color: rgba(255,255,255,0.55); }

    .mass-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .mass-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,168,76,0.25);
      padding: 2rem;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .mass-card:hover { background: rgba(255,255,255,0.1); }

    .mass-card-day {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .mass-card-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: white;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .mass-card-desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    .mass-card-location {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    /* ACTIVITIES */
    #activities { background: var(--cream); }

    .activities-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .activity-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      padding: 1.75rem;
      border-radius: 2px;
    }

    .activity-icon { font-size: 1.75rem; margin-bottom: 1rem; }

    .activity-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .activity-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* QUOTE */
    .quote-band {
      background: var(--gold);
      padding: 3.5rem 2rem;
      text-align: center;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      font-style: italic;
      font-weight: 300;
      color: var(--navy);
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .quote-attr {
      margin-top: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-mid);
      opacity: 0.7;
    }

    /* CONNECT */
    #connect { background: var(--warm-white); }

    .connect-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-top: 3rem;
    }

    .info-block { margin-bottom: 1.5rem; }

    .info-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
    }

    .info-value a {
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
    }

    .join-card {
      background: var(--navy);
      padding: 2.5rem;
      border-radius: 2px;
    }

    .join-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: white;
      margin-bottom: 1rem;
    }

    .join-card p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1.75rem;
      line-height: 1.7;
    }

    .newsletter-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .newsletter-row input {
      flex: 1;
      padding: 0.
